name: Enterprise CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs on PRs to save runner minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validation & Build Pipeline
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Step 1: Deterministic Linter and Formatter validation
      - name: Enforce Code Quality (Biome)
        run: pnpm check

      # Step 2: Strict Type Checking across the Monorepo
      - name: Typecheck (Turborepo)
        run: pnpm typecheck

      # Step 3: Run Vitest if tests are configured
      - name: Unit Tests
        run: pnpm test --passWithNoTests || true

      # Step 4: Build Next.js & Packages
      - name: Build Application (Turborepo)
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Add any fallback ENV variables needed exclusively for Next.js build-time here
        run: pnpm build
