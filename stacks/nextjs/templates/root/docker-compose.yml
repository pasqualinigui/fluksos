version: '3.8'

services:
  # Banco de Dados Principal
  postgres:
    image: postgres:18-alpine
    container_name: fluksos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fluksos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Cache (Opcional, usado para BFF e Filas Futuras)
  redis:
    image: redis:8-alpine
    container_name: fluksos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
