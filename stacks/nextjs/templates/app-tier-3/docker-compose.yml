version: '3.8'

services:
  db:
    # Usando pgvector por padrão: preparado para IA (RAG) sem custo adicional
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: nextjs-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my-db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
