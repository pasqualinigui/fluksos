name: Bug Report
description: Create a report to help us improve the Fluksos CLI
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: Fluksos Version
      description: Which version of the CLI are you using?
      placeholder: e.g. 1.0.18
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: Which OS and Node.js version are you using?
      placeholder: e.g. Windows 11, Node 24.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: What commands did you run to hit this bug?
      placeholder: |
        1. Run `npx fluksos@latest init nextjs ...`
        2. Select 'Tier 3'
        3. See error
    validations:
      required: true
